<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1E88E5">
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\":\"基金做T助手\",
        \"short_name\":\"T-Noter\",
        \"start_url\":\".\",
        \"display\":\"standalone\",
        \"theme_color\":\"#1E88E5\",
        \"background_color\":\"#ffffff\"
    }">
    <title>基金做T助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.4;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px 80px 12px;
            min-height: 100vh;
        }
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: #f5f7fb;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #1E88E5, #43a047);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .icon-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 14px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 44px;
            min-height: 44px;
        }
        .icon-btn:active { background: #e2e8f0; }
        .icon-btn.danger { border-color: #ef4444; color: #ef4444; }
        .icon-btn.danger:hover { background: #fef2f2; }
        .icon-btn.spinning {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fund-list {
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr;
        }
        @media (min-width: 640px) { .fund-list { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .fund-list { grid-template-columns: repeat(3, 1fr); } }
        .fund-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
            position: relative;
        }
        .fund-card .card-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 4px;
        }
        .fund-card .card-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 6px;
            border-radius: 8px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .fund-card .card-actions button:hover { opacity: 1; }
        .fund-card .card-actions .del-btn:hover { color: #ef4444; }
        .fund-name {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-right: 60px;
        }
        .fund-code { color: #64748b; font-size: 0.75rem; font-weight: normal; }
        .fund-stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            margin: 12px 0;
            font-size: 0.85rem;
        }
        .stat-item { flex: 1; min-width: 80px; }
        .stat-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; }
        .stat-value { font-weight: 600; font-size: 0.95rem; }
        .profit-negative { color: #10b981; }
        .profit-positive { color: #ef4444; }
        .net-value-date {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 8px;
            text-align: right;
        }
        .net-value-date .pending { color: #f59e0b; }
        .status-badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 4px;
        }
        .status-badge.success { background: #d1fae5; color: #065f46; }
        .status-badge.pending { background: #fef3c7; color: #92400e; }
        .detail-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8fafc;
            z-index: 1000;
            overflow-y: auto;
            padding: 16px;
        }
        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 10;
            flex-wrap: wrap;
            gap: 8px;
        }
        .detail-header .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px;
            min-width: 44px;
        }
        .summary-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .trade-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .trade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #ecfdf5;
            flex-wrap: wrap;
            gap: 8px;
        }
        .trade-item .trade-info {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            align-items: center;
        }
        .trade-item .trade-actions {
            display: flex;
            gap: 4px;
        }
        .trade-item .trade-actions button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            font-size: 0.8rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .trade-item .trade-actions button:hover { opacity: 1; }
        .trade-item .trade-actions .edit-btn:hover { color: #1E88E5; }
        .trade-item .trade-actions .del-btn:hover { color: #ef4444; }
        .trade-buy { border-left: 4px solid #10b981; }
        .trade-sell { border-left: 4px solid #ef4444; }
        .profit-highlight { font-weight: bold; color: #ef4444; }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 32px;
            padding: 24px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 28px;
            cursor: pointer;
        }
        form label { display: block; margin: 12px 0 6px; font-weight: 500; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 16px;
            font-size: 1rem;
        }
        .form-hint { font-size: 0.75rem; color: #64748b; margin-top: 4px; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        button[type="submit"] {
            margin-top: 20px;
            width: 100%;
            background: #1E88E5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button[type="submit"].danger { background: #ef4444; }
        .hidden { display: none; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 1rem;
        }
        .refresh-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 3000;
            animation: fadeOut 3s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .confirm-dialog {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .confirm-dialog .dialog-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            max-width: 360px;
            width: 90%;
            text-align: center;
        }
        .confirm-dialog .dialog-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }
        .confirm-dialog .dialog-actions button {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }
        .confirm-dialog .dialog-actions .btn-confirm { background: #ef4444; color: white; }
        .confirm-dialog .dialog-actions .btn-cancel { background: #e2e8f0; color: #1e293b; }
        @media (min-width: 768px) and (orientation: landscape) {
            .fund-list { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <header class="app-header">
            <h1>📊 基金做T助手</h1>
            <div class="header-actions">
                <button id="refreshNetValueBtn" class="icon-btn" title="刷新所有净值">🔄</button>
                <button id="addFundBtn" class="icon-btn" title="添加基金">➕</button>
            </div>
        </header>
        <main id="fundListContainer" class="fund-list"></main>
        <footer class="app-footer" style="text-align:center; padding:20px; color:#94a3b8; font-size:12px;">
            数据仅存本地 | 净值来自天天基金
        </footer>
    </div>

    <div id="detailView" class="detail-view hidden">
        <div class="detail-header">
            <div class="left">
                <button id="backToListBtn" class="back-btn">←</button>
                <h2 id="detailFundName"></h2>
            </div>
            <div>
                <button id="addTradeFromDetailBtn" class="icon-btn" title="添加交易">➕</button>
                <button id="deleteFundBtn" class="icon-btn danger" title="删除基金">🗑️</button>
            </div>
        </div>
        <div id="detailContent"></div>
    </div>

    <!-- 基金模态框 -->
    <div id="fundModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="fundModalTitle">添加基金</h3>
            <form id="fundForm">
                <input type="hidden" id="editFundId">
                <label>基金名称 <input type="text" id="fundName" required placeholder="例如：易方达蓝筹"></label>
                <label>基金代码 <input type="text" id="fundCode" required placeholder="例如：005827"></label>
                <div class="form-row">
                    <label>持有份额 <input type="number" id="initShares" step="0.01" value="0" placeholder="当前份额"></label>
                    <label>持有成本 <input type="number" id="initAvgCost" step="0.0001" value="0" placeholder="成本单价"></label>
                </div>
                <div class="form-row">
                    <label>持有收益 <input type="number" id="initHoldingProfit" step="0.01" value="0" placeholder="持仓浮盈"></label>
                    <label>累积收益 <input type="number" id="initAccumulatedProfit" step="0.01" value="0" placeholder="含历史T盈亏"></label>
                </div>
                <div class="form-hint">
                    💡 <strong>持有收益</strong>：当前持仓的浮盈（(净值-成本)×份额）<br>
                    💡 <strong>累积收益</strong>：持有收益 + 历史已实现T盈亏
                </div>
                <button type="submit">保存基金</button>
            </form>
        </div>
    </div>

    <!-- 交易模态框 -->
    <div id="tradeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="tradeModalTitle">记录交易</h3>
            <form id="tradeForm">
                <input type="hidden" id="editTradeId">
                <input type="hidden" id="tradeFundId">
                <label>基金
                    <select id="tradeFundSelect" required></select>
                </label>
                <label>类型
                    <select id="tradeType" required>
                        <option value="buy">买入</option>
                        <option value="sell">卖出</option>
                    </select>
                </label>
                <label>日期 <input type="date" id="tradeDate" required></label>
                <label>份额 <input type="number" id="tradeShares" step="0.01" required placeholder="份额"></label>
                <label>单价 <input type="number" id="tradePrice" step="0.0001" required placeholder="每份单价"></label>
                <button type="submit">确认记录</button>
            </form>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirmDialog" class="confirm-dialog">
        <div class="dialog-content">
            <h3 id="confirmTitle">确认删除</h3>
            <p id="confirmMessage" style="margin-top:12px;color:#64748b;">确定要删除吗？此操作不可撤销。</p>
            <div class="dialog-actions">
                <button class="btn-cancel" onclick="closeConfirm()">取消</button>
                <button class="btn-confirm" id="confirmBtn">确定删除</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_FUNDS = 'tnote_funds';
        const STORAGE_TRADES = 'tnote_trades';

        let currentFunds = [];
        let currentTrades = [];
        let currentDetailFundId = null;
        let isRefreshing = false;
        let confirmCallback = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            renderFundList();
            bindEvents();
            setTimeout(() => refreshAllNetValues(), 800);
        });

        function loadData() {
            const funds = localStorage.getItem(STORAGE_FUNDS);
            if (funds) currentFunds = JSON.parse(funds);
            const trades = localStorage.getItem(STORAGE_TRADES);
            if (trades) currentTrades = JSON.parse(trades);
            
            for (let f of currentFunds) {
                if (!f.netValue) {
                    f.netValue = 1.0;
                    f.netDate = '待刷新';
                }
                if (f.realizedProfit === undefined) f.realizedProfit = 0;
                if (f.baseShares === undefined) f.baseShares = 0;
                if (f.baseAvgCost === undefined) f.baseAvgCost = 0;
                if (f.initialHoldingProfit === undefined) f.initialHoldingProfit = 0;
                if (f.initialAccumulatedProfit === undefined) f.initialAccumulatedProfit = 0;
            }
            saveFunds();
        }

        function saveFunds() {
            localStorage.setItem(STORAGE_FUNDS, JSON.stringify(currentFunds));
        }

        function saveTrades() {
            localStorage.setItem(STORAGE_TRADES, JSON.stringify(currentTrades));
        }

        function getDynamicPosition(fundId) {
            let deltaShares = 0;
            let deltaCost = 0;
            let tradesProfit = 0;
            const trades = currentTrades.filter(t => t.fundId == fundId).sort((a,b) => new Date(a.date) - new Date(b.date));
            
            let runningShares = 0;
            let runningCost = 0;
            
            for (let t of trades) {
                if (t.type === 'buy') {
                    runningShares += t.shares;
                    runningCost += t.shares * t.price;
                } else if (t.type === 'sell') {
                    const avgCost = runningShares > 0 ? runningCost / runningShares : 0;
                    const sellCost = t.shares * avgCost;
                    const sellIncome = t.shares * t.price;
                    const profit = sellIncome - sellCost;
                    tradesProfit += profit;
                    runningShares -= t.shares;
                    runningCost -= sellCost;
                    t.profit = profit;
                }
            }
            saveTrades();
            
            return {
                deltaShares: runningShares,
                deltaCost: runningCost,
                tradesProfit: tradesProfit
            };
        }

        function getFundFullData(fundId, currentNav) {
            const fund = currentFunds.find(f => f.id == fundId);
            if (!fund) return null;
            
            const dynamic = getDynamicPosition(fundId);
            
            const totalShares = (fund.baseShares || 0) + dynamic.deltaShares;
            const totalCost = (fund.baseShares || 0) * (fund.baseAvgCost || 0) + dynamic.deltaCost;
            const avgCost = totalShares > 0 ? totalCost / totalShares : 0;
            
            const holdingProfit = totalShares * (currentNav - avgCost);
            
            const initialRealized = (fund.initialAccumulatedProfit || 0) - (fund.initialHoldingProfit || 0);
            const totalAccumulated = holdingProfit + initialRealized + dynamic.tradesProfit;
            
            return {
                totalShares,
                avgCost,
                holdingProfit,
                totalAccumulated
            };
        }

        function getProfitColor(value) {
            return value < 0 ? 'profit-negative' : 'profit-positive';
        }

        function getProfitSign(value) {
            return value >= 0 ? '+' : '';
        }

        // ==================== 删除基金 ====================
        function deleteFund(fundId) {
            showConfirm('确认删除基金？', '删除后该基金的所有交易记录也将被删除，此操作不可撤销。', () => {
                currentFunds = currentFunds.filter(f => f.id != fundId);
                currentTrades = currentTrades.filter(t => t.fundId != fundId);
                saveFunds();
                saveTrades();
                if (currentDetailFundId == fundId) {
                    hideDetail();
                }
                renderFundList();
                showToast('🗑️ 已删除基金');
            });
        }

        // ==================== 删除交易 ====================
        function deleteTrade(tradeId) {
            showConfirm('确认删除交易记录？', '此操作不可撤销。', () => {
                currentTrades = currentTrades.filter(t => t.id != tradeId);
                saveTrades();
                renderFundList();
                if (currentDetailFundId) {
                    showFundDetail(currentDetailFundId);
                }
                showToast('🗑️ 已删除交易记录');
            });
        }

        // ==================== 确认对话框 ====================
        function showConfirm(title, message, callback) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmDialog').style.display = 'flex';
            confirmCallback = callback;
        }

        function closeConfirm() {
            document.getElementById('confirmDialog').style.display = 'none';
            confirmCallback = null;
        }

        document.getElementById('confirmBtn').addEventListener('click', function() {
            if (confirmCallback) {
                confirmCallback();
            }
            closeConfirm();
        });

        // ==================== 渲染基金列表 ====================
        function renderFundList() {
            const container = document.getElementById('fundListContainer');
            if (!container) return;
            
            if (currentFunds.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ 点击右上角➕添加基金 ✨</div>';
                return;
            }
            
            container.innerHTML = currentFunds.map(fund => {
                const nav = fund.netValue || 1.0;
                const data = getFundFullData(fund.id, nav);
                if (!data) return '';
                
                const isPending = fund.netDate === '待刷新';
                
                return `
                    <div class="fund-card" data-id="${fund.id}">
                        <div class="card-actions">
                            <button class="edit-btn" onclick="event.stopPropagation(); openEditFundModal('${fund.id}')" title="编辑基金">✏️</button>
                            <button class="del-btn" onclick="event.stopPropagation(); deleteFund('${fund.id}')" title="删除基金">🗑️</button>
                        </div>
                        <div class="fund-name" onclick="showFundDetail('${fund.id}')">
                            ${escapeHtml(fund.name)} 
                            <span class="fund-code">${fund.code}</span>
                            <span class="status-badge ${isPending ? 'pending' : 'success'}">${isPending ? '待刷新' : '已更新'}</span>
                        </div>
                        <div class="fund-stats" onclick="showFundDetail('${fund.id}')">
                            <div class="stat-item">
                                <div class="stat-label">📦 份额</div>
                                <div class="stat-value">${data.totalShares.toFixed(2)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">💰 持有成本</div>
                                <div class="stat-value">${data.avgCost.toFixed(4)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">💹 持有收益</div>
                                <div class="stat-value ${getProfitColor(data.holdingProfit)}">${getProfitSign(data.holdingProfit)}${data.holdingProfit.toFixed(2)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">🏆 累积收益</div>
                                <div class="stat-value ${getProfitColor(data.totalAccumulated)}">${getProfitSign(data.totalAccumulated)}${data.totalAccumulated.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="net-value-date" onclick="showFundDetail('${fund.id}')">
                            📊 净值: ${nav.toFixed(4)} ${isPending ? '<span class="pending">(待刷新)</span>' : `(${fund.netDate})`}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== 基金详情 ====================
        function showFundDetail(fundId) {
            const fund = currentFunds.find(f => f.id == fundId);
            if (!fund) return;
            currentDetailFundId = fundId;
            
            const nav = fund.netValue || 1.0;
            const data = getFundFullData(fundId, nav);
            if (!data) return;
            
            const trades = currentTrades.filter(t => t.fundId == fundId).sort((a,b) => new Date(b.date) - new Date(a.date));
            
            const tradesHtml = trades.map(t => {
                const isSell = t.type === 'sell';
                let profitHtml = '';
                if (isSell && t.profit !== undefined && t.profit !== null) {
                    const profitSign = t.profit >= 0 ? '+' : '';
                    profitHtml = `<span class="profit-highlight">💰 ${profitSign}${t.profit.toFixed(2)}</span>`;
                }
                return `
                    <div class="trade-item ${isSell ? 'trade-sell' : 'trade-buy'}">
                        <div class="trade-info">
                            <span>📅 ${t.date}</span>
                            <span>${t.type === 'buy' ? '买入' : '卖出'} ${t.shares.toFixed(2)}份 @ ${t.price.toFixed(4)}</span>
                            ${profitHtml}
                        </div>
                        <div class="trade-actions">
                            <button class="edit-btn" onclick="openEditTradeModal('${t.id}')" title="编辑">✏️</button>
                            <button class="del-btn" onclick="deleteTrade('${t.id}')" title="删除">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            const noTradesHtml = trades.length === 0 ? '<div style="padding:20px;text-align:center;color:#94a3b8;">暂无交易记录，点击➕添加</div>' : '';
            
            const detailHtml = `
                <div class="summary-card">
                    <div><strong>📦 持有份额</strong><br>${data.totalShares.toFixed(2)}</div>
                    <div><strong>💰 持有成本</strong><br>${data.avgCost.toFixed(4)}</div>
                    <div><strong>📊 最新净值</strong><br>${nav.toFixed(4)}<br><span style="font-size:12px;color:#94a3b8;">${fund.netDate}</span></div>
                    <div><strong>💹 持有收益</strong><br><span class="${getProfitColor(data.holdingProfit)}">${getProfitSign(data.holdingProfit)}${data.holdingProfit.toFixed(2)}</span></div>
                    <div><strong>🏆 累积收益</strong><br><span class="${getProfitColor(data.totalAccumulated)}">${getProfitSign(data.totalAccumulated)}${data.totalAccumulated.toFixed(2)}</span></div>
                </div>
                <div class="trade-list">
                    <h4 style="padding:12px;margin:0;">📋 交易流水</h4>
                    ${tradesHtml || noTradesHtml}
                </div>
            `;
            
            document.getElementById('detailContent').innerHTML = detailHtml;
            document.getElementById('detailFundName').innerHTML = fund.name;
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('appContainer').style.display = 'none';
        }

        function hideDetail() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('appContainer').style.display = 'block';
            renderFundList();
        }

        // ==================== 编辑基金 ====================
        function openEditFundModal(fundId) {
            const fund = currentFunds.find(f => f.id == fundId);
            if (!fund) return;
            
            document.getElementById('fundModalTitle').textContent = '编辑基金';
            document.getElementById('editFundId').value = fund.id;
            document.getElementById('fundName').value = fund.name;
            document.getElementById('fundCode').value = fund.code;
            document.getElementById('initShares').value = fund.baseShares || 0;
            document.getElementById('initAvgCost').value = fund.baseAvgCost || 0;
            document.getElementById('initHoldingProfit').value = fund.initialHoldingProfit || 0;
            document.getElementById('initAccumulatedProfit').value = fund.initialAccumulatedProfit || 0;
            document.getElementById('fundModal').style.display = 'flex';
        }

        function saveFundEdit(id, name, code, shares, avgCost, holdingProfit, accumProfit) {
            const fund = currentFunds.find(f => f.id == id);
            if (!fund) return;
            fund.name = name;
            fund.code = code;
            fund.baseShares = parseFloat(shares) || 0;
            fund.baseAvgCost = parseFloat(avgCost) || 0;
            fund.initialHoldingProfit = parseFloat(holdingProfit) || 0;
            fund.initialAccumulatedProfit = parseFloat(accumProfit) || 0;
            saveFunds();
            renderFundList();
            if (currentDetailFundId == id) showFundDetail(id);
            showToast('✅ 基金已更新');
        }

        // ==================== 编辑交易 ====================
        function openEditTradeModal(tradeId) {
            const trade = currentTrades.find(t => t.id == tradeId);
            if (!trade) return;
            
            document.getElementById('tradeModalTitle').textContent = '编辑交易';
            document.getElementById('editTradeId').value = trade.id;
            document.getElementById('tradeFundId').value = trade.fundId;
            document.getElementById('tradeFundSelect').value = trade.fundId;
            document.getElementById('tradeType').value = trade.type;
            document.getElementById('tradeDate').value = trade.date;
            document.getElementById('tradeShares').value = trade.shares;
            document.getElementById('tradePrice').value = trade.price;
            document.getElementById('tradeModal').style.display = 'flex';
        }

        function saveTradeEdit(id, fundId, type, date, shares, price) {
            const trade = currentTrades.find(t => t.id == id);
            if (!trade) return;
            
            // 如果是卖出，重新计算盈亏
            let profit = trade.profit;
            if (type === 'sell') {
                const nav = 1.0;
                const data = getFundFullData(fundId, nav);
                // 简化处理：编辑时重新计算盈亏
                const fund = currentFunds.find(f => f.id == fundId);
                if (fund) {
                    const fullData = getFundFullData(fundId, fund.netValue || 1.0);
                    // 使用当前平均成本计算
                    profit = parseFloat(shares) * (parseFloat(price) - fullData.avgCost);
                }
            } else {
                profit = null;
            }
            
            trade.fundId = fundId;
            trade.type = type;
            trade.date = date;
            trade.shares = parseFloat(shares);
            trade.price = parseFloat(price);
            trade.profit = profit;
            
            saveTrades();
            renderFundList();
            if (currentDetailFundId == fundId) showFundDetail(fundId);
            showToast('✅ 交易已更新');
        }

        // ==================== JSONP 抓取净值 ====================
        function fetchNetValue(fundCode) {
            return new Promise((resolve) => {
                const scriptId = 'jsonp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                const timeout = 8000;
                let timer = null;
                let resolved = false;

                function cleanup() {
                    if (timer) clearTimeout(timer);
                    const script = document.getElementById(scriptId);
                    if (script) document.body.removeChild(script);
                }

                timer = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        cleanup();
                        resolve(null);
                    }
                }, timeout);

                const script = document.createElement('script');
                script.id = scriptId;
                script.src = `https://fundgz.1234567.com.cn/js/${fundCode}.js?rt=${Date.now()}`;
                script.charset = 'gbk';
                
                script.onerror = function() {
                    if (!resolved) {
                        resolved = true;
                        cleanup();
                        resolve(null);
                    }
                };

                const originalJsonpgz = window.jsonpgz;

                window.jsonpgz = function(data) {
                    if (!resolved) {
                        resolved = true;
                        cleanup();
                        
                        try {
                            const netValue = parseFloat(data.gsz);
                            if (netValue && !isNaN(netValue) && netValue > 0) {
                                let date = data.gztime || '';
                                if (date.includes(' ')) date = date.split(' ')[0];
                                if (!date || date.length < 8) {
                                    date = new Date().toISOString().slice(0,10);
                                }
                                if (originalJsonpgz) window.jsonpgz = originalJsonpgz;
                                else delete window.jsonpgz;
                                resolve({ netValue, date });
                            } else {
                                if (originalJsonpgz) window.jsonpgz = originalJsonpgz;
                                else delete window.jsonpgz;
                                resolve(null);
                            }
                        } catch(e) {
                            if (originalJsonpgz) window.jsonpgz = originalJsonpgz;
                            else delete window.jsonpgz;
                            resolve(null);
                        }
                    }
                };

                document.body.appendChild(script);
            });
        }

        async function refreshAllNetValues() {
            if (isRefreshing) return;
            if (currentFunds.length === 0) {
                showToast('📭 暂无基金，请先添加');
                return;
            }
            
            isRefreshing = true;
            const btn = document.getElementById('refreshNetValueBtn');
            btn.classList.add('spinning');
            
            let successCount = 0;
            let failCount = 0;
            
            for (let fund of currentFunds) {
                const result = await fetchNetValue(fund.code);
                if (result && result.netValue && !isNaN(result.netValue) && result.netValue > 0) {
                    fund.netValue = result.netValue;
                    fund.netDate = result.date;
                    successCount++;
                } else {
                    failCount++;
                }
                await new Promise(r => setTimeout(r, 300));
            }
            
            saveFunds();
            renderFundList();
            
            btn.classList.remove('spinning');
            isRefreshing = false;
            
            if (successCount === 0) {
                showToast('⚠️ 净值抓取失败，请稍后重试');
            } else {
                showToast(`✅ 刷新完成: ${successCount} 成功${failCount > 0 ? `, ${failCount} 失败` : ''}`);
            }
        }

        function showToast(msg) {
            const old = document.querySelector('.refresh-toast');
            if (old) old.remove();
            const toast = document.createElement('div');
            toast.className = 'refresh-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // ==================== 基金和交易管理 ====================
        function addFund(name, code, initShares, initAvgCost, initHoldingProfit, initAccumulatedProfit) {
            const id = Date.now().toString();
            const newFund = { 
                id, 
                name, 
                code, 
                netValue: 1.0, 
                netDate: '待刷新',
                baseShares: parseFloat(initShares) || 0,
                baseAvgCost: parseFloat(initAvgCost) || 0,
                initialHoldingProfit: parseFloat(initHoldingProfit) || 0,
                initialAccumulatedProfit: parseFloat(initAccumulatedProfit) || 0
            };
            currentFunds.push(newFund);
            saveFunds();
            renderFundList();
            
            fetchNetValue(code).then(result => {
                if (result) {
                    newFund.netValue = result.netValue;
                    newFund.netDate = result.date;
                    saveFunds();
                    renderFundList();
                }
            });
        }

        function addTrade(fundId, type, date, shares, price) {
            const tradeId = Date.now() + '_' + Math.random();
            let profit = null;
            
            if (type === 'sell') {
                const fund = currentFunds.find(f => f.id == fundId);
                if (!fund) return false;
                const nav = fund.netValue || 1.0;
                const data = getFundFullData(fundId, nav);
                if (data.totalShares < shares) {
                    alert('❌ 卖出份额不足！当前持有：' + data.totalShares.toFixed(2));
                    return false;
                }
                profit = shares * (price - data.avgCost);
            }
            
            currentTrades.push({ 
                id: tradeId, 
                fundId, 
                type, 
                date, 
                shares: parseFloat(shares), 
                price: parseFloat(price), 
                profit 
            });
            saveTrades();
            renderFundList();
            
            if (currentDetailFundId == fundId) {
                showFundDetail(fundId);
            }
            return true;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 添加基金
            document.getElementById('addFundBtn').onclick = () => {
                document.getElementById('fundModalTitle').textContent = '添加基金';
                document.getElementById('editFundId').value = '';
                document.getElementById('fundForm').reset();
                document.getElementById('initShares').value = '0';
                document.getElementById('initAvgCost').value = '0';
                document.getElementById('initHoldingProfit').value = '0';
                document.getElementById('initAccumulatedProfit').value = '0';
                document.getElementById('fundModal').style.display = 'flex';
            };
            
            document.getElementById('refreshNetValueBtn').onclick = () => refreshAllNetValues();
            document.getElementById('backToListBtn').onclick = () => hideDetail();
            document.getElementById('addTradeFromDetailBtn').onclick = () => {
                if (currentDetailFundId) openTradeModal(currentDetailFundId);
            };
            document.getElementById('deleteFundBtn').onclick = () => {
                if (currentDetailFundId) deleteFund(currentDetailFundId);
            };
            
            // 模态框关闭
            const modals = document.querySelectorAll('.modal');
            const closeSpans = document.querySelectorAll('.close');
            closeSpans.forEach(span => {
                span.onclick = () => { modals.forEach(m => m.style.display = 'none'); };
            });
            window.onclick = (e) => { 
                if (e.target.classList && e.target.classList.contains('modal')) 
                    e.target.style.display = 'none'; 
            };
            
            // 基金表单
            document.getElementById('fundForm').onsubmit = (e) => {
                e.preventDefault();
                const editId = document.getElementById('editFundId').value;
                const name = document.getElementById('fundName').value;
                const code = document.getElementById('fundCode').value;
                const shares = parseFloat(document.getElementById('initShares').value) || 0;
                const avgCost = parseFloat(document.getElementById('initAvgCost').value) || 0;
                const holdingProfit = parseFloat(document.getElementById('initHoldingProfit').value) || 0;
                const accumProfit = parseFloat(document.getElementById('initAccumulatedProfit').value) || 0;
                
                if (!name || !code) {
                    alert('请填写基金名称和代码');
                    return;
                }
                
                if (editId) {
                    saveFundEdit(editId, name, code, shares, avgCost, holdingProfit, accumProfit);
                } else {
                    addFund(name, code, shares, avgCost, holdingProfit, accumProfit);
                }
                document.getElementById('fundModal').style.display = 'none';
                e.target.reset();
            };
            
            // 交易表单
            document.getElementById('tradeForm').onsubmit = (e) => {
                e.preventDefault();
                const editId = document.getElementById('editTradeId').value;
                const fundId = document.getElementById('tradeFundId').value;
                const type = document.getElementById('tradeType').value;
                const date = document.getElementById('tradeDate').value;
                const shares = parseFloat(document.getElementById('tradeShares').value);
                const price = parseFloat(document.getElementById('tradePrice').value);
                
                if (!date) {
                    alert('请选择日期');
                    return;
                }
                if (isNaN(shares) || shares <= 0) {
                    alert('请输入有效的份额');
                    return;
                }
                if (isNaN(price) || price <= 0) {
                    alert('请输入有效的单价');
                    return;
                }
                
                if (editId) {
                    saveTradeEdit(editId, fundId, type, date, shares, price);
                } else {
                    if (addTrade(fundId, type, date, shares, price)) {
                        document.getElementById('tradeModal').style.display = 'none';
                        e.target.reset();
                    }
                }
                document.getElementById('tradeModal').style.display = 'none';
                e.target.reset();
            };
        }
        
        function openTradeModal(fundId = null) {
            document.getElementById('tradeModalTitle').textContent = '记录交易';
            document.getElementById('editTradeId').value = '';
            
            const select = document.getElementById('tradeFundSelect');
            select.innerHTML = currentFunds.map(f => `<option value="${f.id}">${escapeHtml(f.name)}</option>`).join('');
            if (fundId) {
                select.value = fundId;
                document.getElementById('tradeFundId').value = fundId;
            } else {
                document.getElementById('tradeFundId').value = select.value;
            }
            select.onchange = () => {
                document.getElementById('tradeFundId').value = select.value;
            };
            document.getElementById('tradeDate').value = new Date().toISOString().slice(0,10);
            document.getElementById('tradeForm').reset();
            document.getElementById('tradeType').value = 'buy';
            document.getElementById('tradeModal').style.display = 'flex';
        }
        
        document.getElementById('tradeFundSelect')?.addEventListener('change', function() {
            document.getElementById('tradeFundId').value = this.value;
        });
    </script>
</body>
