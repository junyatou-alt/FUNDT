<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1E88E5">
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\":\"基金做T助手\",
        \"short_name\":\"T-Noter\",
        \"start_url\":\".\",
        \"display\":\"standalone\",
        \"theme_color\":\"#1E88E5\",
        \"background_color\":\"#ffffff\"
    }">
    <title>基金做T助手</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.4;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px 80px 12px;
            min-height: 100vh;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: #f5f7fb;
            z-index: 100;
        }

        .app-header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #1E88E5, #43a047);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .icon-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 14px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 44px;
            min-height: 44px;
        }

        .icon-btn:active {
            background: #e2e8f0;
        }

        .fund-list {
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 640px) {
            .fund-list { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            .fund-list { grid-template-columns: repeat(3, 1fr); }
        }

        .fund-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            border: 1px solid #edf2f7;
        }

        .fund-card:active { transform: scale(0.98); }

        .fund-name {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .fund-code {
            color: #64748b;
            font-size: 0.75rem;
            font-weight: normal;
        }

        .fund-stats {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            margin: 12px 0;
            font-size: 0.85rem;
        }

        .stat-item {
            flex: 1;
            min-width: 80px;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .profit-positive { color: #10b981; }
        .profit-negative { color: #ef4444; }

        .net-value-date {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 8px;
            text-align: right;
        }

        .detail-view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8fafc;
            z-index: 1000;
            overflow-y: auto;
            padding: 16px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px;
            min-width: 44px;
        }

        .summary-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .trade-list {
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }

        .trade-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #ecfdf5;
            flex-wrap: wrap;
            gap: 8px;
        }

        .trade-buy { border-left: 4px solid #10b981; }
        .trade-sell { border-left: 4px solid #ef4444; }
        .profit-highlight { font-weight: bold; color: #ef4444; }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 32px;
            padding: 24px;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 16px;
            font-size: 28px;
            cursor: pointer;
        }

        form label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 16px;
            font-size: 1rem;
        }

        .form-hint {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button[type="submit"] {
            margin-top: 20px;
            width: 100%;
            background: #1E88E5;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden { display: none; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 1rem;
        }

        .refresh-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 3000;
            animation: fadeOut 2s ease forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .fund-list { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <header class="app-header">
            <h1>📊 基金做T助手</h1>
            <div class="header-actions">
                <button id="refreshNetValueBtn" class="icon-btn" title="刷新所有净值">🔄</button>
                <button id="addFundBtn" class="icon-btn" title="添加基金">➕</button>
            </div>
        </header>
        <main id="fundListContainer" class="fund-list"></main>
        <footer class="app-footer" style="text-align:center; padding:20px; color:#94a3b8; font-size:12px;">
            数据仅存本地 | 净值需手动刷新
        </footer>
    </div>

    <div id="detailView" class="detail-view hidden">
        <div class="detail-header">
            <button id="backToListBtn" class="back-btn">← 返回</button>
            <h2 id="detailFundName"></h2>
            <button id="addTradeFromDetailBtn" class="icon-btn">➕</button>
        </div>
        <div id="detailContent"></div>
    </div>

    <div id="fundModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>添加基金</h3>
            <form id="fundForm">
                <label>基金名称 <input type="text" id="fundName" required placeholder="例如：易方达蓝筹"></label>
                <label>基金代码 <input type="text" id="fundCode" required placeholder="例如：005827"></label>
                
                <div class="form-row">
                    <label>持有份额 <input type="number" id="initShares" step="0.01" value="0" placeholder="当前份额"></label>
                    <label>平均成本 <input type="number" id="initAvgCost" step="0.0001" value="0" placeholder="成本单价"></label>
                </div>
                
                <div class="form-row">
                    <label>持有收益 <input type="number" id="initHoldingProfit" step="0.01" value="0" placeholder="持仓浮盈"></label>
                    <label>累积收益 <input type="number" id="initAccumulatedProfit" step="0.01" value="0" placeholder="含历史T盈亏"></label>
                </div>
                
                <div class="form-hint">
                    💡 <strong>持有收益</strong>：当前持仓的浮盈（(净值-成本)×份额）<br>
                    💡 <strong>累积收益</strong>：持有收益 + 历史已实现T盈亏
                </div>
                <button type="submit">保存基金</button>
            </form>
        </div>
    </div>

    <div id="tradeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>记录交易</h3>
            <form id="tradeForm">
                <input type="hidden" id="tradeFundId">
                <label>基金
                    <select id="tradeFundSelect" required></select>
                </label>
                <label>类型
                    <select id="tradeType" required>
                        <option value="buy">买入</option>
                        <option value="sell">卖出</option>
                    </select>
                </label>
                <label>日期 <input type="date" id="tradeDate" required></label>
                <label>份额 <input type="number" id="tradeShares" step="0.01" required placeholder="份额"></label>
                <label>单价 <input type="number" id="tradePrice" step="0.0001" required placeholder="每份单价"></label>
                <button type="submit">确认记录</button>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_FUNDS = 'tnote_funds';
        const STORAGE_TRADES = 'tnote_trades';

        let currentFunds = [];
        let currentTrades = [];
        let currentDetailFundId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            renderFundList();
            bindEvents();
        });

        function loadData() {
            const funds = localStorage.getItem(STORAGE_FUNDS);
            if (funds) currentFunds = JSON.parse(funds);
            const trades = localStorage.getItem(STORAGE_TRADES);
            if (trades) currentTrades = JSON.parse(trades);
            
            for (let f of currentFunds) {
                if (!f.netValue) {
                    f.netValue = 1.0;
                    f.netDate = '待刷新';
                }
                // 确保字段存在
                if (f.realizedProfit === undefined) f.realizedProfit = 0;
                if (f.baseShares === undefined) f.baseShares = 0;
                if (f.baseAvgCost === undefined) f.baseAvgCost = 0;
            }
            saveFunds();
        }

        function saveFunds() {
            localStorage.setItem(STORAGE_FUNDS, JSON.stringify(currentFunds));
        }

        function saveTrades() {
            localStorage.setItem(STORAGE_TRADES, JSON.stringify(currentTrades));
        }

        // 从交易记录计算动态变化（买入卖出）
        function getDynamicPosition(fundId) {
            let deltaShares = 0;
            let deltaCost = 0;
            let tradesProfit = 0;
            const trades = currentTrades.filter(t => t.fundId == fundId).sort((a,b) => new Date(a.date) - new Date(b.date));
            
            let runningShares = 0;
            let runningCost = 0;
            
            for (let t of trades) {
                if (t.type === 'buy') {
                    runningShares += t.shares;
                    runningCost += t.shares * t.price;
                } else if (t.type === 'sell') {
                    const avgCost = runningShares > 0 ? runningCost / runningShares : 0;
                    const sellCost = t.shares * avgCost;
                    const sellIncome = t.shares * t.price;
                    const profit = sellIncome - sellCost;
                    tradesProfit += profit;
                    runningShares -= t.shares;
                    runningCost -= sellCost;
                    t.profit = profit;
                }
            }
            saveTrades();
            
            return {
                deltaShares: runningShares,
                deltaCost: runningCost,
                tradesProfit: tradesProfit
            };
        }

        // 获取基金完整数据
        function getFundFullData(fundId, currentNav) {
            const fund = currentFunds.find(f => f.id == fundId);
            if (!fund) return null;
            
            const dynamic = getDynamicPosition(fundId);
            
            // 最终份额 = 基础份额 + 动态变化的份额
            const totalShares = (fund.baseShares || 0) + dynamic.deltaShares;
            // 最终总成本 = 基础成本 + 动态变化的成本
            const totalCost = (fund.baseShares || 0) * (fund.baseAvgCost || 0) + dynamic.deltaCost;
            const avgCost = totalShares > 0 ? totalCost / totalShares : 0;
            
            // 持有收益 = 份额 × (当前净值 - 平均成本)
            const holdingProfit = totalShares * (currentNav - avgCost);
            
            // 累积收益 = 持有收益 + 历史已实现盈亏（来自添加时的累积收益中的已实现部分）+ 交易记录产生的盈亏
            // 添加时的累积收益 = 当时的持有收益 + 当时的已实现盈亏
            // 所以当时的已实现盈亏 = 添加时累积收益 - 添加时持有收益
            const initialRealized = (fund.initialAccumulatedProfit || 0) - (fund.initialHoldingProfit || 0);
            const totalAccumulated = holdingProfit + initialRealized + dynamic.tradesProfit;
            
            return {
                totalShares,
                avgCost,
                holdingProfit,
                totalAccumulated
            };
        }

        function renderFundList() {
            const container = document.getElementById('fundListContainer');
            if (!container) return;
            
            if (currentFunds.length === 0) {
                container.innerHTML = '<div class="empty-state">✨ 点击右上角➕添加基金 ✨</div>';
                return;
            }
            
            container.innerHTML = currentFunds.map(fund => {
                const nav = fund.netValue || 1.0;
                const data = getFundFullData(fund.id, nav);
                if (!data) return '';
                
                const profitClass = data.totalAccumulated >= 0 ? 'profit-positive' : 'profit-negative';
                const profitSign = data.totalAccumulated >= 0 ? '+' : '';
                const holdingProfitClass = data.holdingProfit >= 0 ? 'profit-positive' : 'profit-negative';
                const holdingSign = data.holdingProfit >= 0 ? '+' : '';
                
                return `
                    <div class="fund-card" data-id="${fund.id}">
                        <div class="fund-name">
                            ${escapeHtml(fund.name)} 
                            <span class="fund-code">${fund.code}</span>
                        </div>
                        <div class="fund-stats">
                            <div class="stat-item">
                                <div class="stat-label">📦 份额</div>
                                <div class="stat-value">${data.totalShares.toFixed(2)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">💰 成本</div>
                                <div class="stat-value">${data.avgCost.toFixed(4)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">💹 持有收益</div>
                                <div class="stat-value ${holdingProfitClass}">${holdingSign}${data.holdingProfit.toFixed(2)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">🏆 累积收益</div>
                                <div class="stat-value ${profitClass}">${profitSign}${data.totalAccumulated.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="net-value-date">
                            📊 净值: ${nav.toFixed(4)} (${fund.netDate || '待刷新'})
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.fund-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const id = card.getAttribute('data-id');
                    showFundDetail(id);
                });
            });
        }

        function showFundDetail(fundId) {
            const fund = currentFunds.find(f => f.id == fundId);
            if (!fund) return;
            currentDetailFundId = fundId;
            
            const nav = fund.netValue || 1.0;
            const data = getFundFullData(fundId, nav);
            if (!data) return;
            
            const trades = currentTrades.filter(t => t.fundId == fundId).sort((a,b) => new Date(b.date) - new Date(a.date));
            
            const tradesHtml = trades.map(t => {
                const isSell = t.type === 'sell';
                let profitHtml = '';
                if (isSell && t.profit !== undefined && t.profit !== null) {
                    const profitSign = t.profit >= 0 ? '+' : '';
                    profitHtml = `<span class="profit-highlight">💰 ${profitSign}${t.profit.toFixed(2)}</span>`;
                }
                return `
                    <div class="trade-item ${isSell ? 'trade-sell' : 'trade-buy'}">
                        <span>📅 ${t.date}</span>
                        <span>${t.type === 'buy' ? '买入' : '卖出'} ${t.shares.toFixed(2)}份 @ ${t.price.toFixed(4)}</span>
                        ${profitHtml}
                    </div>
                `;
            }).join('');
            
            const noTradesHtml = trades.length === 0 ? '<div style="padding:20px;text-align:center;color:#94a3b8;">暂无交易记录，点击➕添加</div>' : '';
            
            const detailHtml = `
                <div class="summary-card">
                    <div><strong>📦 持有份额</strong><br>${data.totalShares.toFixed(2)}</div>
                    <div><strong>💰 平均成本</strong><br>${data.avgCost.toFixed(4)}</div>
                    <div><strong>📊 最新净值</strong><br>${nav.toFixed(4)}<br><span style="font-size:12px">${fund.netDate}</span></div>
                    <div><strong>💹 持有收益</strong><br>${data.holdingProfit >= 0 ? '+' : ''}${data.holdingProfit.toFixed(2)}</div>
                    <div><strong>🏆 累积收益</strong><br>${data.totalAccumulated >= 0 ? '+' : ''}${data.totalAccumulated.toFixed(2)}</div>
                </div>
                <div class="trade-list">
                    <h4 style="padding:12px;margin:0;">📋 交易流水</h4>
                    ${tradesHtml || noTradesHtml}
                </div>
            `;
            
            document.getElementById('detailContent').innerHTML = detailHtml;
            document.getElementById('detailFundName').innerHTML = fund.name;
            document.getElementById('detailView').classList.remove('hidden');
            document.getElementById('appContainer').style.display = 'none';
        }

        function hideDetail() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('appContainer').style.display = 'block';
            renderFundList();
        }

        async function fetchNetValue(fundCode) {
            try {
                const response = await fetch(`https://fundgz.1234567.com.cn/js/${fundCode}.js?t=${Date.now()}`);
                const text = await response.text();
                const match = text.match(/jsonpgz\((.*)\)/);
                if (match && match[1]) {
                    const data = JSON.parse(match[1]);
                    return {
                        netValue: parseFloat(data.gsz),
                        date: data.gztime ? data.gztime.split(' ')[0] : new Date().toISOString().slice(0,10)
                    };
                }
                throw new Error('解析失败');
            } catch(e) {
                console.warn(`抓取${fundCode}净值失败:`, e);
                return null;
            }
        }

        async function refreshAllNetValues() {
            let successCount = 0;
            for (let fund of currentFunds) {
                const result = await fetchNetValue(fund.code);
                if (result && result.netValue) {
                    fund.netValue = result.netValue;
                    fund.netDate = result.date;
                    successCount++;
                    await new Promise(r => setTimeout(r, 300));
                }
            }
            saveFunds();
            renderFundList();
            showToast(`已刷新 ${successCount}/${currentFunds.length} 只基金净值`);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'refresh-toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // 添加基金
        function addFund(name, code, initShares, initAvgCost, initHoldingProfit, initAccumulatedProfit) {
            const id = Date.now().toString();
            const newFund = { 
                id, 
                name, 
                code, 
                netValue: 1.0, 
                netDate: '待刷新',
                baseShares: parseFloat(initShares) || 0,
                baseAvgCost: parseFloat(initAvgCost) || 0,
                initialHoldingProfit: parseFloat(initHoldingProfit) || 0,
                initialAccumulatedProfit: parseFloat(initAccumulatedProfit) || 0
            };
            
            currentFunds.push(newFund);
            saveFunds();
            renderFundList();
        }

        function addTrade(fundId, type, date, shares, price) {
            const tradeId = Date.now() + '_' + Math.random();
            let profit = null;
            
            if (type === 'sell') {
                const fund = currentFunds.find(f => f.id == fundId);
                if (!fund) return false;
                
                const nav = fund.netValue || 1.0;
                const data = getFundFullData(fundId, nav);
                if (data.totalShares < shares) {
                    alert('❌ 卖出份额不足！当前持有：' + data.totalShares.toFixed(2));
                    return false;
                }
                profit = shares * (price - data.avgCost);
            }
            
            currentTrades.push({ 
                id: tradeId, 
                fundId, 
                type, 
                date, 
                shares: parseFloat(shares), 
                price: parseFloat(price), 
                profit 
            });
            saveTrades();
            renderFundList();
            
            if (currentDetailFundId == fundId) {
                showFundDetail(fundId);
            }
            return true;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function bindEvents() {
            document.getElementById('addFundBtn').onclick = () => {
                document.getElementById('fundModal').style.display = 'flex';
                document.getElementById('fundForm').reset();
                document.getElementById('initShares').value = '0';
                document.getElementById('initAvgCost').value = '0';
                document.getElementById('initHoldingProfit').value = '0';
                document.getElementById('initAccumulatedProfit').value = '0';
            };
            document.getElementById('refreshNetValueBtn').onclick = () => refreshAllNetValues();
            document.getElementById('backToListBtn').onclick = () => hideDetail();
            document.getElementById('addTradeFromDetailBtn').onclick = () => {
                if (currentDetailFundId) openTradeModal(currentDetailFundId);
            };
            
            const modals = document.querySelectorAll('.modal');
            const closeSpans = document.querySelectorAll('.close');
            closeSpans.forEach(span => {
                span.onclick = () => { modals.forEach(m => m.style.display = 'none'); };
            });
            window.onclick = (e) => { 
                if (e.target.classList && e.target.classList.contains('modal')) 
                    e.target.style.display = 'none'; 
            };
            
            document.getElementById('fundForm').onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('fundName').value;
                const code = document.getElementById('fundCode').value;
                const initShares = parseFloat(document.getElementById('initShares').value) || 0;
                const initAvgCost = parseFloat(document.getElementById('initAvgCost').value) || 0;
                const initHoldingProfit = parseFloat(document.getElementById('initHoldingProfit').value) || 0;
                const initAccumulatedProfit = parseFloat(document.getElementById('initAccumulatedProfit').value) || 0;
                
                if (!name || !code) {
                    alert('请填写基金名称和代码');
                    return;
                }
                
                addFund(name, code, initShares, initAvgCost, initHoldingProfit, initAccumulatedProfit);
                document.getElementById('fundModal').style.display = 'none';
                e.target.reset();
            };
            
            document.getElementById('tradeForm').onsubmit = (e) => {
                e.preventDefault();
                const fundId = document.getElementById('tradeFundId').value;
                const type = document.getElementById('tradeType').value;
                const date = document.getElementById('tradeDate').value;
                const shares = parseFloat(document.getElementById('tradeShares').value);
                const price = parseFloat(document.getElementById('tradePrice').value);
                
                if (!date) {
                    alert('请选择日期');
                    return;
                }
                if (isNaN(shares) || shares <= 0) {
                    alert('请输入有效的份额');
                    return;
                }
                if (isNaN(price) || price <= 0) {
                    alert('请输入有效的单价');
                    return;
                }
                
                if (addTrade(fundId, type, date, shares, price)) {
                    document.getElementById('tradeModal').style.display = 'none';
                    e.target.reset();
                }
            };
        }
        
        function openTradeModal(fundId = null) {
            const select = document.getElementById('tradeFundSelect');
            select.innerHTML = currentFunds.map(f => `<option value="${f.id}">${escapeHtml(f.name)}</option>`).join('');
            if (fundId) {
                select.value = fundId;
                document.getElementById('tradeFundId').value = fundId;
            } else {
                document.getElementById('tradeFundId').value = select.value;
            }
            
            select.onchange = () => {
                document.getElementById('tradeFundId').value = select.value;
            };
            
            document.getElementById('tradeDate').value = new Date().toISOString().slice(0,10);
            document.getElementById('tradeModal').style.display = 'flex';
        }
        
        document.getElementById('tradeFundSelect')?.addEventListener('change', function() {
            document.getElementById('tradeFundId').value = this.value;
        });
    </script>
</body>
</html>
